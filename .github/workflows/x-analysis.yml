name: X Analysis Pipeline

on:
  schedule:
    # 毎週月曜 6:00 JST (日曜 21:00 UTC)
    - cron: "0 21 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: x-analysis
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Check required secrets
        id: gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY 未設定のためスキップ (Settings → Secrets → Actions で設定してください)"
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.ready == 'true'
        with:
          node-version: 20

      - name: Install CLIs (claude / codex)
        if: steps.gate.outputs.ready == 'true'
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -g @openai/codex || echo "codex CLI のインストールに失敗。grok_search.py 直接実行にフォールバックします"

      - name: Run pipeline
        if: steps.gate.outputs.ready == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: bash x-analysis/scripts/run_pipeline.sh

      - name: Commit results
        if: steps.gate.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add x-analysis/reports x-analysis/playbook x-analysis/data
          if git diff --cached --quiet; then
            echo "変更なし"
            exit 0
          fi
          git commit -m "chore(x-analysis): weekly analysis $(date -u +%F)"
          # 在庫watcherが main に頻繁にコミットするため rebase してから push
          for i in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push origin "HEAD:${GITHUB_REF_NAME}" && break
            sleep $((i * 5))
          done
